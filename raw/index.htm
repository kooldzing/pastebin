
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw Content</title>
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --bg-start: #f1f3f6;
        --bg-end: #cdd2d9;
        --bg-glow: rgba(142, 149, 160, 0.18);
        --fg: #1d232c;
        --panel-bg: rgba(255, 255, 255, 0.76);
        --panel-border: rgba(137, 144, 155, 0.5);
        --panel-shadow: rgba(41, 47, 56, 0.16);
        --btn-top: #727a86;
        --btn-bottom: #565e69;
        --btn-fg: #f7f8fa;
        --btn-border: #858d99;
        --btn-shadow: rgba(30, 35, 44, 0.24);
      }
      body.dark {
        --bg-start: #16191f;
        --bg-end: #2a2f37;
        --bg-glow: rgba(118, 124, 134, 0.16);
        --fg: #f3f5f8;
        --panel-bg: rgba(24, 28, 34, 0.9);
        --panel-border: rgba(121, 128, 139, 0.34);
        --panel-shadow: rgba(2, 4, 8, 0.46);
        --btn-top: #6e7681;
        --btn-bottom: #515861;
        --btn-fg: #f5f6f8;
        --btn-border: #878f9a;
        --btn-shadow: rgba(2, 4, 8, 0.34);
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, var(--bg-glow), transparent 26%),
          linear-gradient(180deg, var(--bg-start), var(--bg-end));
        color: var(--fg);
        font-family: Consolas, Monaco, "Courier New", monospace;
      }
      .toolbar {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        gap: 10px;
      }
      .code-frame {
        position: relative;
        margin: 14px 18px 18px;
        width: calc(100% - 36px);
        min-height: calc(100vh - 32px);
        border-radius: 20px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        box-shadow:
          0 24px 56px var(--panel-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          inset 0 -18px 36px rgba(4, 11, 26, 0.1);
        overflow: hidden;
        isolation: isolate;
      }
      .control-btn {
        background: linear-gradient(180deg, var(--btn-top), var(--btn-bottom));
        color: var(--btn-fg);
        border: 1px solid var(--btn-border);
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 13px;
        text-align: center;
        cursor: pointer;
        box-shadow:
          0 2px 6px rgba(4, 10, 24, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
      }
      .copy-btn {
        min-width: 84px;
      }
      .theme-btn {
        width: 44px;
      }
      .control-btn:hover {
        transform: none;
        filter: brightness(1.01);
        box-shadow:
          0 3px 8px rgba(4, 10, 24, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }
      .control-btn:active {
        transform: none;
        box-shadow:
          0 1px 4px rgba(4, 10, 24, 0.16),
          inset 0 1px 2px rgba(0, 0, 0, 0.12);
      }
      .content {
        margin: 0;
        padding: 24px 26px;
        min-height: calc(100vh - 32px);
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
        font-size: 14px;
        overflow: auto;
      }
      @media (max-width: 720px) {
        .control-btn {
          padding: 9px 12px;
        }
        .code-frame {
          margin: 10px 12px 12px;
          width: calc(100% - 24px);
          min-height: calc(100vh - 22px);
          border-radius: 16px;
        }
        .toolbar {
          top: 12px;
          right: 12px;
        }
        .content {
          min-height: calc(100vh - 22px);
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="code-frame">
      <div class="toolbar">
        <button id="copy-btn" class="control-btn copy-btn" type="button">Copy</button>
        <button id="theme-btn" class="control-btn theme-btn" type="button" aria-label="Toggle theme">&#x1F319;</button>
      </div>
      <pre id="raw-content" class="content">Loading...</pre>
    </div>

    <script>
      const THEME_STORAGE_KEY = 'raw_6haygt_theme';
      const contentElement = document.getElementById('raw-content');
      const copyButton = document.getElementById('copy-btn');
      const themeButton = document.getElementById('theme-btn');
      const defaultCopyLabel = 'Copy';
      const copiedLabel = 'Copied \u2705';
      let loadedText = '';
      let copyLabelTimer = null;

      function setTheme(mode) {
        const isDark = mode === 'dark';
        document.body.classList.toggle('dark', isDark);
        themeButton.textContent = isDark ? '\u2600\uFE0F' : '\u{1F319}';
        localStorage.setItem(THEME_STORAGE_KEY, isDark ? 'dark' : 'light');
      }

      function toggleTheme() {
        const isDark = document.body.classList.contains('dark');
        setTheme(isDark ? 'light' : 'dark');
      }

      async function loadTextFile() {

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || "e5hb3f";
    
      try {
    
        const response = await fetch('../pastes/' + id + '.txt', { cache: 'no-store' });
    
        if (!response.ok) {
          throw new Error('Unable to load file');
        }
    
        loadedText = await response.text();
        contentElement.textContent = loadedText;
    
      } catch (error) {
    
        loadedText = 'Unable to load content file.';
        contentElement.textContent = loadedText;
    
      }
    
    }

      async function copyLoadedText() {
        const textToCopy = loadedText;
        try {
          await navigator.clipboard.writeText(textToCopy);
          copyButton.textContent = copiedLabel;
          if (copyLabelTimer) {
            clearTimeout(copyLabelTimer);
          }
          copyLabelTimer = setTimeout(() => {
            copyButton.textContent = defaultCopyLabel;
            copyLabelTimer = null;
          }, 1500);
        } catch (error) {
          copyButton.textContent = defaultCopyLabel;
        }
      }

      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      setTheme(savedTheme === 'light' ? 'light' : 'dark');

      themeButton.addEventListener('click', toggleTheme);
      copyButton.addEventListener('click', copyLoadedText);
      loadTextFile();
    </script>
  </body>
</html>
